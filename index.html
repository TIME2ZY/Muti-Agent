<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>多 Agent 协作台</title>
  <link rel="stylesheet" href="/public/styles.css">
  <!-- Prism.js for syntax highlighting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markup.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Mobile sidebar toggle -->
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="对话列表">☰ 对话</button>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <button class="btn-new-chat" id="btn-new-chat">+ 新对话</button>
      </div>
      <nav class="session-list" id="session-list"></nav>
    </aside>

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main -->
    <main class="main">
      <div class="main-header">
        <span class="main-title">多 Agent 协作台</span>
        <span class="project-dir" id="project-dir" title="点击修改项目目录">
          <span class="project-dir-icon">📁</span>
          <span class="project-dir-path" id="project-dir-path"></span>
          <span class="project-dir-edit">✎</span>
        </span>
        <span class="worktree-status" id="worktree-status" title="当前对话的修改 worktree"></span>
        <button class="recall-toggle" id="recall-toggle" aria-label="回忆面板" title="回忆：查看本会话的调用记录">回忆</button>
        <button class="theme-toggle" id="theme-toggle" aria-label="切换亮暗模式" title="切换亮暗模式">◐</button>
        <span class="main-status" id="status" style="display:none"></span>
      </div>

      <div class="skills-bar" id="skills-bar">
        <span class="skills-bar-label">已激活能力</span>
      </div>

      <section class="messages" id="messages" aria-live="polite" aria-label="消息列表">
        <div class="empty-state" id="empty-state">
          <div class="empty-state-icon">✦</div>
          输入 @ 选择模型并开始对话
          <small>Enter 发送 · Shift + Enter 换行</small>
        </div>
        <div class="messages-spacer"></div>
      </section>

      <aside class="side-panel" aria-label="右侧面板">
        <div class="panel-tabs" role="tablist" aria-label="右侧面板标签">
          <button id="panel-tab-agents" class="panel-tab is-active" type="button" role="tab" aria-selected="true">参与 Agent</button>
          <button id="panel-tab-workspace" class="panel-tab" type="button" role="tab" aria-selected="false">工作区</button>
          <button id="panel-tab-recall" class="panel-tab" type="button" role="tab" aria-selected="false">回忆</button>
        </div>

        <section class="agent-panel" id="agent-panel" role="tabpanel" aria-label="模型列表">
          <div class="agent-panel-head">
            <div class="agent-panel-title">参与 Agent</div>
          </div>
          <div class="agent-tabs" id="agent-tabs" aria-label="可用模型"></div>
        </section>

        <section class="workspace-panel" id="workspace-panel" role="tabpanel" aria-label="工作区" hidden></section>

        <section class="recall-panel-inline" id="recall-panel-inline" role="tabpanel" aria-label="回忆" hidden>
          <div class="recall-search">
            <input id="recall-search-input-inline" type="search" placeholder="搜索历史（关键词）…" autocomplete="off" />
          </div>
          <div class="recall-body" id="recall-body-inline"></div>
        </section>
      </aside>

      <section class="composer">
        <div class="composer-input">
          <div class="mention-menu" id="mention-menu" hidden></div>
          <textarea id="prompt" placeholder="输入 @ 选择模型，然后输入消息…" rows="2"></textarea>
        </div>
        <div class="composer-actions">
          <label class="worktree-mode" title="为本次对话创建或复用隔离 worktree">
            <input id="use-worktree" type="checkbox">
            <span>改代码</span>
          </label>
          <div class="composer-actions-right">
            <button id="btn-clear" class="btn-cmd" type="button">清空</button>
            <button id="btn-send" class="btn-cmd primary" type="button">发送</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Recall now lives as the third tab inside the right-side panel;
       the legacy standalone drawer and overlay have been removed. -->

  <script src="/public/session-api.js"></script>
  <script src="/public/session-controller.js"></script>
  <script src="/public/worktree-api.js"></script>
  <script src="/public/recall-api.js"></script>
  <script src="/public/chat-client.js"></script>
  <script src="/public/markdown-lite.js"></script>
  <script src="/public/workspace-diff.js"></script>
  <script src="/public/app.js"></script>
</body>
</html>
