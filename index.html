<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="shift-ui-token" content="__SHIFT_UI_TOKEN__" />
    <title>SHIFT AGENTS · 交班台</title>
    <link rel="icon" href="/public/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/public/styles.css" />
    <!-- Prism.js (vendored for offline use) -->
    <link rel="stylesheet" href="/public/vendor/prism/prism-tomorrow.min.css" />
    <script src="/public/vendor/prism/prism.min.js"></script>
    <script src="/public/vendor/prism/prism-javascript.min.js"></script>
    <script src="/public/vendor/prism/prism-typescript.min.js"></script>
    <script src="/public/vendor/prism/prism-python.min.js"></script>
    <script src="/public/vendor/prism/prism-bash.min.js"></script>
    <script src="/public/vendor/prism/prism-json.min.js"></script>
    <script src="/public/vendor/prism/prism-css.min.js"></script>
    <script src="/public/vendor/prism/prism-markup.min.js"></script>
    <!-- Markdown: markdown-it + GFM plugins + DOMPurify (vendored offline) -->
    <script src="/public/vendor/markdown/markdown-it.min.js"></script>
    <script src="/public/vendor/markdown/markdown-it-multimd-table.min.js"></script>
    <script src="/public/vendor/markdown/markdown-it-task-lists.min.js"></script>
    <script src="/public/vendor/markdown/purify.min.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#messages">跳到对话内容</a>
    <div class="app">
      <!-- Mobile sidebar toggle -->
      <button
        class="sidebar-toggle"
        id="sidebar-toggle"
        type="button"
        aria-label="对话列表"
        aria-controls="sidebar"
        aria-expanded="false"
      >
        <svg
          class="icon-svg"
          width="16"
          height="16"
          viewBox="0 0 16 16"
          aria-hidden="true"
          focusable="false"
        >
          <path fill="currentColor" d="M2 3.5h12v1.5H2zm0 3.75h12v1.5H2zm0 3.75h12V12.5H2z" />
        </svg>
        对话
      </button>

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand" aria-label="Shift 交班台">
          <span class="brand-mark" aria-hidden="true">
            <svg class="icon-svg" width="22" height="22" viewBox="0 0 24 24" focusable="false">
              <path
                d="M5 6.5h8.5M10.5 3l3.5 3.5-3.5 3.5M19 17.5h-8.5M13.5 14l-3.5 3.5 3.5 3.5"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </span>
          <span class="brand-copy">
            <strong>SHIFT</strong>
            <small>多智能体交班台</small>
          </span>
        </div>
        <div class="sidebar-head">
          <button class="btn-new-chat" id="btn-new-chat" type="button">
            <svg
              class="icon-svg"
              width="16"
              height="16"
              viewBox="0 0 16 16"
              aria-hidden="true"
              focusable="false"
            >
              <path
                d="M8 3v10M3 8h10"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
              />
            </svg>
            新建会话
          </button>
        </div>
        <nav class="session-list" id="session-list" aria-label="对话列表"></nav>
      </aside>

      <!-- Sidebar overlay (mobile) -->
      <div class="sidebar-overlay" id="sidebar-overlay"></div>

      <!-- Main -->
      <main class="main">
        <div class="main-header">
          <div class="main-identity">
            <span class="main-title">
              <strong id="current-session-title" aria-live="polite">新会话</strong>
            </span>
            <button
              type="button"
              class="context-status"
              id="context-status"
              hidden
              aria-label="当前 Agent 上下文用量"
              title="打开 Agents 查看上下文用量"
            >
              <span class="context-status-label">上下文</span>
              <strong id="context-status-value">—</strong>
            </button>
            <span class="main-status" id="status" style="display: none"></span>
          </div>

          <div class="main-header-tools">
            <div class="header-tool-group" aria-label="项目与工作区">
              <span
                class="project-dir"
                id="project-dir"
                title="点击修改项目目录"
                aria-label="修改项目目录"
                role="button"
                tabindex="0"
              >
                <span class="project-dir-icon" aria-hidden="true">
                  <svg
                    class="icon-svg"
                    width="14"
                    height="14"
                    viewBox="0 0 16 16"
                    focusable="false"
                  >
                    <path
                      fill="currentColor"
                      d="M1.5 3.5A1.5 1.5 0 0 1 3 2h3.2l1.2 1.5H13A1.5 1.5 0 0 1 14.5 5v7A1.5 1.5 0 0 1 13 13.5H3A1.5 1.5 0 0 1 1.5 12z"
                    />
                  </svg>
                </span>
                <span class="project-dir-path" id="project-dir-path"></span>
                <span class="project-dir-edit" aria-hidden="true">
                  <svg
                    class="icon-svg"
                    width="12"
                    height="12"
                    viewBox="0 0 16 16"
                    focusable="false"
                  >
                    <path
                      fill="currentColor"
                      d="M11.7 1.3a1 1 0 0 1 1.4 0l1.6 1.6a1 1 0 0 1 0 1.4L6.4 12.6 3 13.5l.9-3.4z"
                    />
                  </svg>
                </span>
              </span>
              <span
                class="worktree-status"
                id="worktree-status"
                title="当前对话的修改 worktree"
              ></span>
            </div>
            <button
              class="theme-toggle header-icon-btn"
              id="theme-toggle"
              type="button"
              aria-label="切换主题"
              title="切换主题"
            ></button>
          </div>
        </div>

        <details class="skills-bar" id="skills-bar" hidden>
          <summary class="skills-bar-label">
            <span>本会话规则</span>
            <strong id="skills-count">0</strong>
            <span class="skills-chevron" aria-hidden="true">⌄</span>
          </summary>
          <div class="skills-tags" id="skills-tags"></div>
        </details>

        <div class="messages-column" id="messages-column">
          <section class="messages" id="messages" aria-live="polite" aria-label="消息列表">
            <div class="empty-state" id="empty-state">
              <div class="empty-state-icon" aria-hidden="true">
                <svg class="icon-svg" width="28" height="28" viewBox="0 0 32 32" focusable="false">
                  <path
                    d="M7 9h11M14 5l4 4-4 4M25 23H14M18 19l-4 4 4 4"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.7"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
              </div>
              <p class="empty-state-title">今天想推进什么？</p>
              <p class="empty-state-hint">直接描述任务；需要特定协作者时输入 @</p>
              <div
                class="empty-state-chips"
                id="empty-state-chips"
                role="group"
                aria-label="示例提示"
              >
                <button
                  type="button"
                  class="empty-chip"
                  data-prompt="帮我梳理当前项目结构，并给出优先改进点。"
                >
                  梳理项目
                </button>
                <button
                  type="button"
                  class="empty-chip"
                  data-prompt="审查最近改动的 diff，指出风险与可改进处。"
                >
                  审查 diff
                </button>
                <button
                  type="button"
                  class="empty-chip"
                  data-prompt="把任务拆成可并行的子任务，并建议合适的 Agent 分工。"
                >
                  并行分工
                </button>
              </div>
            </div>
            <div class="messages-spacer"></div>
          </section>
          <button type="button" class="jump-bottom" id="jump-bottom" hidden aria-label="回到底部">
            ↓ 回到底部
          </button>
        </div>

        <aside class="side-panel" id="side-panel" aria-label="右侧面板">
          <div class="panel-tabs" role="tablist" aria-label="右侧面板标签">
            <button
              id="panel-tab-agents"
              class="panel-tab is-active"
              type="button"
              role="tab"
              aria-selected="true"
              aria-controls="agent-panel"
              tabindex="0"
            >
              协作者
            </button>
            <button
              id="panel-tab-workspace"
              class="panel-tab"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="workspace-panel"
              tabindex="-1"
            >
              工作区<span class="tab-badge" id="workspace-tab-badge" hidden></span>
            </button>
            <button
              id="panel-tab-recall"
              class="panel-tab"
              type="button"
              role="tab"
              aria-selected="false"
              aria-controls="recall-panel-inline"
              tabindex="-1"
            >
              回忆
            </button>
          </div>

          <section
            class="agent-panel"
            id="agent-panel"
            role="tabpanel"
            aria-labelledby="panel-tab-agents"
          >
            <div class="agent-tabs" id="agent-tabs" aria-label="可用 Agents"></div>
          </section>

          <section
            class="workspace-panel"
            id="workspace-panel"
            role="tabpanel"
            aria-labelledby="panel-tab-workspace"
            hidden
          ></section>

          <section
            class="recall-panel-inline"
            id="recall-panel-inline"
            role="tabpanel"
            aria-labelledby="panel-tab-recall"
            hidden
          >
            <div class="recall-search">
              <input
                id="recall-search-input-inline"
                name="recall-search"
                type="search"
                placeholder="搜索历史（关键词）…"
                autocomplete="off"
                spellcheck="false"
                aria-label="搜索历史"
              />
            </div>
            <div class="recall-body" id="recall-body-inline"></div>
          </section>
        </aside>

        <section class="composer">
          <div class="run-bar" id="run-bar" hidden role="status" aria-live="polite">
            <span class="run-bar-dot" aria-hidden="true"></span>
            <span class="run-bar-label" id="run-bar-label">生成中…</span>
            <span class="run-bar-time" id="run-bar-time"></span>
            <button type="button" class="run-bar-stop" id="run-bar-stop">停止</button>
          </div>
          <div class="composer-shell">
            <div class="composer-input">
              <div
                class="mention-menu"
                id="mention-menu"
                role="listbox"
                aria-label="Agent 提及"
                hidden
              ></div>
              <textarea
                id="prompt"
                name="prompt"
                placeholder="描述任务；输入 @ 可指定协作者…"
                rows="1"
                aria-label="任务描述"
                aria-autocomplete="list"
                aria-controls="mention-menu"
                aria-expanded="false"
              ></textarea>
            </div>
            <div class="composer-actions">
              <label class="worktree-mode" title="为本次对话创建或复用隔离 worktree">
                <input id="use-worktree" type="checkbox" />
                <span class="worktree-mode-chip">改代码</span>
              </label>
              <div class="composer-actions-right">
                <button
                  id="btn-send"
                  class="btn-cmd primary"
                  type="button"
                  aria-label="发送"
                  aria-busy="false"
                >
                  发送
                </button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div class="toast-host" id="toast-host" aria-live="polite" aria-relevant="additions"></div>

    <!-- Recall now lives as the third tab inside the right-side panel;
       the legacy standalone drawer and overlay have been removed. -->

    <!-- App modules load in order via boot.js (see public/boot.js MODULES). -->
    <script src="/public/boot.js"></script>
  </body>
</html>
