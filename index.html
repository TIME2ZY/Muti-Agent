<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Agent Chat</title>
  <link rel="stylesheet" href="/public/styles.css">
</head>
<body>
  <div class="app">
    <!-- Mobile sidebar toggle -->
    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="对话列表">☰ 对话</button>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <button class="btn-new-chat" id="btn-new-chat">+ 新对话</button>
      </div>
      <nav class="session-list" id="session-list"></nav>
    </aside>

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main -->
    <main class="main">
      <div class="main-header">
        <span class="main-title">Agent Chat</span>
        <span class="project-dir" id="project-dir" title="点击修改项目目录">
          <span class="project-dir-icon">📁</span>
          <span class="project-dir-path" id="project-dir-path"></span>
          <span class="project-dir-edit">✎</span>
        </span>
        <button class="recall-toggle" id="recall-toggle" aria-label="回忆面板" title="回忆：查看本会话的调用记录">回忆</button>
        <button class="theme-toggle" id="theme-toggle" aria-label="切换亮暗模式" title="切换亮暗模式">◐</button>
        <span class="main-status" id="status" style="display:none"></span>
      </div>

      <div class="skills-bar" id="skills-bar">
        <span class="skills-bar-label">Rules</span>
      </div>

      <section class="messages" id="messages" aria-live="polite" aria-label="消息列表">
        <div class="empty-state" id="empty-state">
          <div class="empty-state-icon">✦</div>
          输入 @ 选择模型并开始对话
          <small>Enter 发送 · Shift+Enter 换行</small>
        </div>
        <div class="messages-spacer"></div>
      </section>

      <aside class="agent-panel" aria-label="模型列表">
        <div class="agent-panel-head">
          <div class="agent-panel-title">Models</div>
        </div>
        <div class="agent-tabs" id="agent-tabs" aria-label="可用模型"></div>
      </aside>

      <section class="composer">
        <div class="composer-input">
          <div class="mention-menu" id="mention-menu" hidden></div>
          <textarea id="prompt" placeholder="输入 @ 选择模型，然后输入消息…" rows="2"></textarea>
        </div>
        <div class="composer-actions">
          <div class="composer-actions-right">
            <button id="btn-clear" class="btn-cmd" type="button">Clear</button>
            <button id="btn-send" class="btn-cmd primary" type="button">Send</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Recall (memory) panel — lists/searches invocations in the current session -->
  <aside class="recall-panel" id="recall-panel" hidden aria-label="回忆面板">
    <div class="recall-head">
      <span class="recall-title">回忆</span>
      <button class="recall-close" id="recall-close" aria-label="关闭">✕</button>
    </div>
    <div class="recall-search">
      <input id="recall-search-input" type="search" placeholder="搜索历史（关键词）…" autocomplete="off" />
    </div>
    <div class="recall-body" id="recall-body"></div>
  </aside>
  <div class="recall-overlay" id="recall-overlay"></div>

  <script src="/public/app.js"></script>
</body>
</html>
